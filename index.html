<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Resistência</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Cálculo de Resistência</h2>

    <label for="tensao">Tensão (V)</label>
    <input type="text" id="tensao" placeholder="Ex: 220" inputmode="numeric">

    <label for="potencia">Potência (W/m)</label>
    <input type="text" id="potencia" placeholder="Ex: 15" inputmode="numeric">

    <label for="comprimento">Comprimento (mm)</label>
    <input type="text" id="comprimento" placeholder="Ex: 2500" inputmode="numeric">

    <button id="btnCalcular">Calcular</button>

    <div class="resultado" id="resultado"></div>
    <div class="erro" id="erro"></div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
